# Render 배포 설정 (https://render.com)
# 이 파일이 있으면 Render에서 "Blueprint"로 자동 구성됩니다.
services:
  - type: web
    name: natmal-tamheomdae
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # 아래 3개는 보안값이라 Render 대시보드에서 직접 입력합니다 (sync: false)
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
